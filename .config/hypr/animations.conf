# ─── Animations ─── snappy windows, horizontal workspace slide ───

animations {
    enabled = true

    bezier = easeOutExpo, 0.16, 1,    0.3,  1
    bezier = easeInOut,   0.65, 0.05, 0.36, 1
    bezier = overshot,    0.05, 0.9,  0.1,  1.1
    bezier = liner,       1,    1,    1,    1

    animation = windows,     1, 5,  overshot,    slide
    animation = windowsIn,   1, 5,  overshot,    slide
    animation = windowsOut,  1, 4,  easeInOut,   slide
    animation = windowsMove, 1, 5,  easeInOut
    animation = border,      1, 10, default
    animation = borderangle, 1, 30, liner,       loop      # rotating gradient border
    animation = fade,        1, 6,  easeInOut
    animation = fadeDim,     1, 6,  easeInOut
    # the one you asked for — slide left/right between workspaces
    animation = workspaces,  1, 6,  easeOutExpo, slide
}
