# Autostart
exec-once = quickshell
exec-once = hypridle
exec-once = nm-applet

# Wallpaper daemon — restore last wallpaper, or fall back to a default
exec-once = awww-daemon
exec-once = sleep 1 && (awww restore || awww img ~/Pictures/Wallpapers/wallpaper4.jpg -t none)
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
