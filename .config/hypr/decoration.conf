# ─── Decoration ─── frosted glass blur, rounding, soft shadow ───

decoration {
    rounding = 10

    active_opacity = 1.0
    inactive_opacity = 0.92

    blur {
        enabled = true
        size = 4
        passes = 2
        new_optimizations = true
        ignore_opacity = true
        xray = false
        # frosted glass character (kept subtle)
        vibrancy = 0.1
        vibrancy_darkness = 0.05
        noise = 0.008
        contrast = 1.0
        brightness = 1.0
    }

    shadow {
        enabled = true
        range = 16
        render_power = 3
        color = rgba(11111baa)
        color_inactive = rgba(11111b55)
    }
}

# Terminal frost: kitty already runs at background_opacity 0.85 (~/.config/kitty),
# so the blur above shows through it as frosted glass — no window rule needed.
# (0.55.2's `windowrule`/`layerrule` reject the v2 comma syntax; revisit for
#  per-app opacity / panel-layer blur later.)

# Blur the quickshell layer surfaces (bar + panels) — 0.55 block syntax.
layerrule[blur-quickshell] {
    match:namespace = ^(quickshell)$
    blur = true
    ignore_alpha = 0.2
}

# Semi-transparent (frosted) Thunar — the global blur shows through.
windowrule[thunar-frost] {
    match:class = ^(thunar)$
    opacity = 0.88 0.85
}
