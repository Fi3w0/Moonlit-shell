# ─── General ─── gradient color borders + tight gaps ───

general {
    gaps_in = 3
    gaps_out = 8
    border_size = 2

    # catppuccin gradient: pink → mauve → blue (animated via borderangle)
    col.active_border = rgba(f38ba8ee) rgba(cba6f7ee) rgba(89b4faee) 45deg
    col.inactive_border = rgba(313244aa)

    layout = dwindle
    resize_on_border = true
    allow_tearing = false
}

dwindle {
    preserve_split = true
    smart_split = false
}

master {
    new_status = master
}
