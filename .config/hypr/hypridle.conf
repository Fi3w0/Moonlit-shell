general {
    lock_cmd = pidof hyprlock || hyprlock      # avoid spawning multiple hyprlock instances
    before_sleep_cmd = loginctl lock-session    # lock just before suspending
    after_sleep_cmd = hyprctl dispatch dpms on  # turn the display back on after wake
}

# Suspend after 15 minutes of no activity.
# (Caffeine in Quick Settings inhibits idle and pauses this.)
listener {
    timeout = 900
    on-timeout = systemctl suspend
}
