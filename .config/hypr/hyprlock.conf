background {
    monitor =
    # Current wallpaper with frosted-glass blur
    path = /home/fiw/.cache/lock-wallpaper
    blur_passes = 4
    blur_size = 12
    noise = 0.015
    contrast = 0.95
    brightness = 0.7
    # Dark overlay for legibility
    color = rgba(17, 17, 27, 0.55)
}

input-field {
    monitor =
    size = 280, 52
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgb(89b4fa)
    inner_color = rgb(1e1e2e)
    font_color = rgb(cdd6f4)
    fade_on_empty = false
    placeholder_text = <i>Password…</i>
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(205, 214, 244, 1.0)
    font_size = 64
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, 90
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = rgba(166, 173, 200, 1.0)
    font_size = 16
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, 30
    halign = center
    valign = center
}
