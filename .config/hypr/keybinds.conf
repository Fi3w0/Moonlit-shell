$mainMod = SUPER
$terminal = kitty

# --- Apps ---
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, Space, exec, rofi -show drun

# --- Windows ---
bind = $mainMod, W, killactive
bind = $mainMod, Tab, cyclenext
bind = $mainMod, F, fullscreen

# --- Workspaces ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4

# --- Move window to workspace ---
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4

# --- Float toggle ---
bind = $mainMod, P, togglefloating

# --- Wallpaper (B = background) ---
bind = $mainMod, B, exec, qs ipc call panel toggle wallpaper
bind = $mainMod SHIFT, B, exec, flock -n /tmp/wallrand.lock -c 'W=$(find ~/Pictures/Wallpapers -type f | shuf -n1); awww img "$W" -t grow --transition-fps 60 --transition-duration 1.1 --resize crop && printf "%s" "$W" > ~/.cache/wallpaper-current; sleep 1.3'

# --- Screenshots → save to ~/Pictures/Screenshots/ AND copy to clipboard ---
# (cliphist watcher stores the clipboard image in history automatically)
bind = ALT, S, exec, grim -g "$(slurp)" - | tee ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png | wl-copy --type image/png
bind = ALT, D, exec, grim - | tee ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png | wl-copy --type image/png

# --- Brightness (hold to repeat; show OSD via quickshell IPC) ---
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 5%- && qs ipc call osd set brightness $(brightnessctl -m | cut -d, -f4 | tr -d %)
bindel = , XF86MonBrightnessUp,   exec, brightnessctl s 5%+ && qs ipc call osd set brightness $(brightnessctl -m | cut -d, -f4 | tr -d %)

# --- Mouse ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
